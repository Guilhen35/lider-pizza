  <style>
    body { font-family: 'Nunito', sans-serif; }
    h1, h2, h3, .font-display { font-family: 'Oswald', sans-serif; }

    /* Gradiente animado no hero */
    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .hero-bg {
      background: linear-gradient(270deg, #228B22, #1a6b1a, #C41E3A, #a01729);
      background-size: 400% 400%;
      animation: gradientShift 8s ease infinite;
    }

    /* Card hover */
    .pizza-card {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .pizza-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 32px rgba(196, 30, 58, 0.18);
    }

    /* Navbar link underline */
    .nav-link::after {
      content: '';
      display: block;
      height: 2px;
      width: 0;
      background: #FFD700;
      transition: width 0.3s ease;
    }
    .nav-link:hover::after,
    .nav-link.active::after {
      width: 100%;
    }
    .nav-link.active { color: #FFD700; }

    /* Smooth scroll */
    html { scroll-behavior: smooth; }

    /* Botão WhatsApp pulse */
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.4); }
      50%       { box-shadow: 0 0 0 12px rgba(37, 211, 102, 0); }
    }
    .btn-whatsapp { animation: pulse 2s infinite; }

    /* Fade in */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeInUp 0.6s ease forwards; }
    .delay-1 { animation-delay: 0.1s; opacity: 0; }
    .delay-2 { animation-delay: 0.2s; opacity: 0; }
    .delay-3 { animation-delay: 0.3s; opacity: 0; }
    .delay-4 { animation-delay: 0.4s; opacity: 0; }

    /* Scrollbar customizado */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #228B22; border-radius: 05px; }

    /* ---------- CARDÁPIO ---------- */
    function CardapioPage() {
      const [categoria, setCategoria] = useState('all');
      const [tamanho, setTamanho]     = useState('grande');

      const allPizzas = Object.entries(PIZZAS).flatMap(([cat, items]) =>
        items.map(p => ({ ...p, cat }))
      );
      const lista = categoria === 'all' ? allPizzas : PIZZAS[categoria].map(p => ({ ...p, cat: categoria }));

      return (
        <div className="max-w-6xl mx-auto px-4 py-12">
          <p className="text-vermelho-600 font-display tracking-widest text-sm uppercase mb-2">Sabores Incríveis</p>
          <h2 className="font-display text-5xl font-bold text-gray-800 mb-1">Nosso <span className="text-verde-600">Cardápio</span></h2>
          <p className="text-gray-500 mb-10">Todas as pizzas acompanham molho ao sugo e orégano. Para pizza meio a meio prevalece o maior valor.</p>

          {/* Filtros de categoria */}
          <div className="bg-white rounded-2xl p-4 shadow-sm mb-4 border border-gray-100">
            <p className="text-xs text-gray-400 font-bold uppercase tracking-widest mb-3">Categoria</p>
            <div className="flex flex-wrap gap-2">
              {CATEGORIAS.map(c => (
                <button
                  key={c.key}
                  onClick={() => setCategoria(c.key)}
                  className={`px-4 py-2 rounded-full font-display text-sm tracking-wide transition-all ${
                    categoria === c.key
                      ? 'bg-vermelho-600 text-white shadow-md scale-105'
                      : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                  }`}
                >
                  {c.emoji} {c.label}
                </button>
              ))}
            </div>
          </div>

          {/* Seletor de tamanho */}
          <div className="bg-white rounded-2xl p-4 shadow-sm mb-8 border border-gray-100">
            <p className="text-xs text-gray-400 font-bold uppercase tracking-widest mb-3">Tamanho</p>
            <div className="grid grid-cols-3 gap-3">
              {TAMANHOS.map(t => (
                <button
                  key={t.key}
                  onClick={() => setTamanho(t.key)}
                  className={`p-3 rounded-xl font-display text-sm transition-all border-2 ${
                    tamanho === t.key
                      ? 'border-verde-600 bg-verde-50 text-verde-700'
                      : 'border-gray-200 bg-white text-gray-600 hover:border-gray-300'
                  }`}
                >
                  <span className="block font-bold text-base">{t.label}</span>
                  <span className="block text-xs opacity-70">{t.info}</span>
                </button>
              ))}
            </div>
          </div>

          {/* Grid de pizzas */}
          <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-5">
            {lista.map((pizza, idx) => (
